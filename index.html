      { time: "14:00–15:30", activity: "⛩️ Meiji Shrine", detail: "Serene Shinto shrine in a forest in the middle of Tokyo. Walk through the massive torii gate and gravel paths. Free. Adjacent to Yoyogi Park.", type: "sight" },
      { time: "15:30–16:30", activity: "🛍️ Takeshita Street (Harajuku)", detail: "Wild, colorful teen fashion street. Crepes, cotton candy, quirky shops. Even if it's not your vibe, it's a spectacle. 2-min walk from Meiji Shrine.", type: "explore" },
      { time: "17:00–18:00", activity: "🛍️ Omotesando", detail: "Tokyo's Champs-Élysées. High-end architecture and flagship stores. Window shop or browse. Beautiful tree-lined boulevard.", type: "explore" },
      { time: "18:30–19:30", activity: "🍣 Dinner: Sushi at Sushi no Midori (Shibuya)", detail: "High-quality sushi at very reasonable prices. Always a line but moves fast. Shibuya Mark City branch. ~¥3,000 for a full set.", type: "food" },
      { time: "20:00–21:30", activity: "🌃 Shibuya Crossing & Shibuya Sky", detail: "See the world's busiest intersection from above at Shibuya Sky observation deck (¥2,000, book online). Or just cross it and feel the energy.", type: "explore" },
    ],
  },
  {
    date: "Apr 24 (Fri)", day: 11, city: "Tokyo", travel: false,
    theme: "teamLab + East Tokyo Culture",
    schedule: [
      { time: "6:30–7:30", activity: "🍳 Early breakfast near hotel", detail: "Grab a quick konbini breakfast or find a morning set at a local kissaten.", type: "food" },
      { time: "8:00–10:30", activity: "🎨 teamLab (scheduled)", detail: "Your pre-booked slot. Immersive digital art experience. Wear dark clothing for best photo contrast. Allow 2-2.5 hours inside.", type: "sight" },
      { time: "11:00–12:00", activity: "⛩️ Senso-ji Temple (Asakusa)", detail: "Tokyo's oldest temple. Approach through the iconic Kaminarimon (Thunder Gate) and Nakamise shopping street. Free. Great for photos and snacks.", type: "sight" },
      { time: "12:00–13:00", activity: "🍜 Lunch: Asakusa area", detail: "Try Sometaro for DIY okonomiyaki in a traditional tatami room. Or Ramen Yoroiya for a rich bowl near Senso-ji. Or get tempura at Daikokuya (historic spot, expect a line).", type: "food" },
      { time: "13:30–14:30", activity: "🛍️ Kappabashi Kitchen Street", detail: "Tokyo's kitchen district — blocks of shops selling restaurant-quality knives, plastic food samples, ceramics, chopsticks. Great for unique souvenirs.", type: "explore" },
      { time: "15:00–16:30", activity: "🎮 Akihabara", detail: "Electric Town — anime, manga, retro gaming, electronics. Browse multi-floor arcades, figure shops, and Super Potato for retro games. Even non-gamers find it fascinating.", type: "explore" },
      { time: "17:00–18:00", activity: "🌿 Ueno Park (if time)", detail: "Large park with museums, a lake, and shrines. Quick walk-through or visit the Tokyo National Museum (¥1,000) if you want deep cultural immersion.", type: "explore" },
      { time: "18:30–20:00", activity: "🍣 Dinner: Standing sushi or Ginza", detail: "Try standing sushi bar Uogashi Nihon-Ichi near Shibuya for fast, high-quality nigiri. Or explore Ginza for a sit-down omakase experience.", type: "food" },
      { time: "20:30–22:00", activity: "🌃 Shinjuku night walk", detail: "Walk through Kabukicho (Tokyo's biggest entertainment district) and peek at Golden Gai's tiny alley architecture. Then stroll Omoide Yokocho (Memory Lane) for the atmosphere and yakitori smoke. Great street photography. Short walk from your hotel.", type: "explore" },
    ],
  },
  {
    date: "Apr 25 (Sat)", day: 12, city: "Tokyo → Osaka", travel: true,
    theme: "Morning Tokyo → Bullet Train → Osaka Blitz",
    schedule: [
      { time: "7:00–8:00", activity: "🐟 Toyosu Market outer area", detail: "Outer market restaurants serve incredible breakfast sushi and seafood. Early morning is best. No lottery needed for outer area.", type: "food" },
      { time: "8:30–9:30", activity: "🌿 Tsukiji Outer Market", detail: "The old market's outer area is still thriving. Street food paradise: tamago on a stick, fresh uni, grilled scallops, oysters. Walk and graze.", type: "explore" },
      { time: "10:00–10:30", activity: "🛍️ Tokyo Station shopping", detail: "Quick stop: Character Street for anime goods, Gransta for premium bento boxes and souvenirs. Pick up omiyage (gifts) here.", type: "explore" },
      { time: "11:00–13:30", activity: "🚆 Nozomi Shinkansen → Shin-Osaka", detail: "Tokyo Station → Shin-Osaka (~2h 30m). ¥13,870 unreserved. Book via SmartEX app. Grab an ekiben for the ride — your last shinkansen meal.", type: "transit" },
      { time: "14:00–14:30", activity: "🏨 Check in KOKO Hotel Namba", detail: "Subway Midosuji Line from Shin-Osaka to Namba (~15 min, ¥280). Drop bags quickly.", type: "explore" },
      { time: "14:30–16:00", activity: "🏯 Osaka Castle", detail: "Iconic castle surrounded by a moat and park. ¥600 to enter the museum inside (great views from top floor). Take subway to Tanimachi 4-chome. Beautiful grounds.", type: "sight" },
      { time: "16:30–17:30", activity: "🛍️ Kuromon Market", detail: "'Osaka's Kitchen' — blocks of seafood stalls. Try: otoro sashimi on a stick, grilled king crab legs, fresh sea urchin, and tamagoyaki. Your big food crawl.", type: "food" },
      { time: "17:30–18:30", activity: "🛍️ Shinsaibashi Shopping Arcade", detail: "Long covered shopping street connecting Namba to Shinsaibashi. Mix of international brands and local shops. Amerikamura (American Village) side streets for vintage fashion. Last souvenir shopping.", type: "explore" },

      { time: "19:30–21:00", activity: "🌃 Shinsekai + Dotonbori evening", detail: "Take the subway to Shinsekai — retro neon neighborhood around Tsutenkaku Tower. Kushikatsu street food everywhere. Then walk back through Dotonbori for the full neon canal experience at night. Browse Don Quijote for last-minute quirky Japanese goods. Pack tonight — early morning tomorrow.", type: "explore" },

      { time: "7:15–8:00", activity: "🚆 Nankai Rapi:t → Kansai Airport", detail: "Namba Station → KIX via Nankai Rapi:t limited express (~38 min, ¥1,450). The retro-futuristic blue train is a fun last ride. Alternatively, the Nankai Airport Express is cheaper (~45 min, ¥930). Trains run every 30 min.", type: "transit" },
      { time: "8:00–10:30", activity: "✈️ Kansai International Airport", detail: "Arrive ~2.5 hrs before your 10:30 AM flight. Check in, clear security, and browse the duty-free shops for last-minute KitKat flavors, Japanese snacks, and skincare. Terminal food court has decent ramen and sushi if you want one final meal.", type: "transit" },
    ],
  },
];

const typeColors = {
  transit: { bg: "rgba(100,149,237,0.15)", border: "rgba(100,149,237,0.3)" },
  sight: { bg: "rgba(233,69,96,0.12)", border: "rgba(233,69,96,0.25)" },
  food: { bg: "rgba(245,166,35,0.12)", border: "rgba(245,166,35,0.25)" },
  explore: { bg: "rgba(78,204,163,0.1)", border: "rgba(78,204,163,0.2)" },
};

function App() {
  const [selectedDay, setSelectedDay] = useState(0);
  const [expandedItems, setExpandedItems] = useState({});
  const toggleItem = (idx) => setExpandedItems(prev => ({...prev, [idx]: !prev[idx]}));
  const day = days[selectedDay];

  return h('div', {style:{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#0f0f1a",color:"#e0e0e0",minHeight:"100vh",maxWidth:600,margin:"0 auto"}},
    h('style', null, `.day-pill{padding:6px 10px;border-radius:20px;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .2s;border:1px solid transparent;font-weight:500;flex-shrink:0}.day-pill:hover{border-color:rgba(233,69,96,.4)}.day-pill.active{background:rgba(233,69,96,.25);border-color:#e94560;color:#fff}.day-pill.inactive{background:rgba(255,255,255,.05);color:#8892b0}.sched-item{cursor:pointer;transition:all .2s;border-radius:10px;padding:12px;margin-bottom:8px}.sched-item:hover{filter:brightness(1.1)}::-webkit-scrollbar{height:4px}::-webkit-scrollbar-thumb{background:rgba(233,69,96,.4);border-radius:4px}`),
    // Header
    h('div', {style:{padding:"20px 16px 12px",textAlign:"center"}},
      h('div', {style:{fontSize:12,letterSpacing:3,color:"#e94560",fontWeight:600,marginBottom:6}}, "🇯🇵 13-DAY JAPAN ITINERARY"),
      h('h1', {style:{fontFamily:"'Zen Kaku Gothic New',sans-serif",fontSize:22,fontWeight:700,color:"#fff",marginBottom:4}}, "April 14–26, 2026"),
      h('p', {style:{fontSize:12,color:"#8892b0"}}, "Packed days · Iconic sights · Best food · For two")
    ),
    // Day selector
    h('div', {style:{overflowX:"auto",padding:"8px 16px 16px",display:"flex",gap:6}},
      days.map((d,i) => h('div', {key:i, className:`day-pill ${selectedDay===i?"active":"inactive"}`, onClick:()=>{setSelectedDay(i);setExpandedItems({})}},
        h('div', {style:{fontSize:10,opacity:.7}}, d.date.split(" ")[0]+" "+(d.date.split(" ")[1]||"").replace(/[()]/g,"")),
        h('div', {style:{fontSize:11,fontWeight:600,marginTop:2}}, d.city.length>14?d.city.split(" ")[0]:d.city)
      ))
    ),
    // Day content
    h('div', {style:{padding:"0 16px 24px"}},
      h('div', {style:{marginBottom:16}},
        h('div', {style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
          h('span', {style:{fontSize:20,fontWeight:700,color:"#fff"}}, "Day "+day.day),
          day.travel && h('span', {style:{fontSize:10,padding:"2px 8px",borderRadius:10,background:"rgba(100,149,237,.2)",color:"#6495ED",fontWeight:600}}, "TRAVEL DAY")
        ),
        h('div', {style:{fontSize:15,fontWeight:600,color:"#f5a623",marginBottom:2}}, day.theme),
        h('div', {style:{fontSize:12,color:"#8892b0"}}, day.city+" · "+day.schedule.length+" activities")
      ),
      day.schedule.map((item,idx) => {
        const tc = typeColors[item.type]||typeColors.explore;
        const isOpen = expandedItems[idx];
        return h('div', {key:idx, className:"sched-item", onClick:()=>toggleItem(idx), style:{background:tc.bg,border:"1px solid "+tc.border}},
          h('div', {style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
            h('div', {style:{flex:1}},
              h('div', {style:{fontSize:10,color:"#8892b0",marginBottom:3,fontWeight:600}}, item.time),
              h('div', {style:{fontSize:14,fontWeight:600,color:"#fff"}}, item.activity)
            ),
            h('span', {style:{fontSize:14,opacity:.5,transform:isOpen?"rotate(180deg)":"rotate(0)",transition:"transform .2s"}}, "▾")
          ),
          isOpen && h('div', {style:{marginTop:8,fontSize:12,color:"#b0b8c8",lineHeight:1.7,borderTop:"1px solid "+tc.border,paddingTop:8}}, item.detail)
        );
      })
    ),
    h('div', {style:{padding:"12px 16px 24px",textAlign:"center",fontSize:11,color:"#5a6174"}}, "Tap any activity to expand details · Prices approximate · April 2026")
  );
}

ReactDOM.render(h(App), document.getElementById('root'));
  </script>
