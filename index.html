<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Japan 2026 — 13-Day Itinerary</title>
  <meta
    name="description"
    content="A 13-day Japan travel itinerary: Kyoto, Himeji, Hiroshima, Miyajima, Kanazawa, Nagano, Tokyo, Osaka. April 14-26, 2026."
  />
  <meta name="theme-color" content="#0f0f1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script>
    const { useState, createElement: h } = React;

    // IMPORTANT:
    // Keep your existing `days` array, but convert ALL smart quotes to straight quotes.
    // Example:
    // date: "Apr 14 (Tue)" not date: “Apr 14 (Tue)”
    const days = [
      // paste your cleaned days array here
    ];

    const typeColors = {
      transit: { bg: "rgba(100,149,237,0.15)", border: "rgba(100,149,237,0.3)" },
      sight: { bg: "rgba(233,69,96,0.12)", border: "rgba(233,69,96,0.25)" },
      food: { bg: "rgba(245,166,35,0.12)", border: "rgba(245,166,35,0.25)" },
      explore: { bg: "rgba(78,204,163,0.1)", border: "rgba(78,204,163,0.2)" },
    };

    function App() {
      const [selectedDay, setSelectedDay] = useState(0);
      const [expandedItems, setExpandedItems] = useState({});
      const toggleItem = (idx) =>
        setExpandedItems((prev) => ({ ...prev, [idx]: !prev[idx] }));

      const day = days[selectedDay];

      return h(
        "div",
        {
          style: {
            fontFamily: "'Segoe UI', system-ui, sans-serif",
            background: "#0f0f1a",
            color: "#e0e0e0",
            minHeight: "100vh",
            maxWidth: 600,
            margin: "0 auto",
          },
        },
        h(
          "style",
          null,
          `
          .day-pill {
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            transition: all .2s;
            border: 1px solid transparent;
            font-weight: 500;
            flex-shrink: 0;
          }
          .day-pill:hover {
            border-color: rgba(233,69,96,.4);
          }
          .day-pill.active {
            background: rgba(233,69,96,.25);
            border-color: #e94560;
            color: #fff;
          }
          .day-pill.inactive {
            background: rgba(255,255,255,.05);
            color: #8892b0;
          }
          .sched-item {
            cursor: pointer;
            transition: all .2s;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
          }
          .sched-item:hover {
            filter: brightness(1.1);
          }
          ::-webkit-scrollbar {
            height: 4px;
          }
          ::-webkit-scrollbar-thumb {
            background: rgba(233,69,96,.4);
            border-radius: 4px;
          }
        `
        ),

        h(
          "div",
          { style: { padding: "20px 16px 12px", textAlign: "center" } },
          h(
            "div",
            {
              style: {
                fontSize: 12,
                letterSpacing: 3,
                color: "#e94560",
                fontWeight: 600,
                marginBottom: 6,
              },
            },
            "🇯🇵 13-DAY JAPAN ITINERARY"
          ),
          h(
            "h1",
            {
              style: {
                fontFamily: "'Zen Kaku Gothic New', sans-serif",
                fontSize: 22,
                fontWeight: 700,
                color: "#fff",
                marginBottom: 4,
              },
            },
            "April 14–26, 2026"
          ),
          h(
            "p",
            { style: { fontSize: 12, color: "#8892b0" } },
            "Packed days · Iconic sights · Best food · For two"
          )
        ),

        h(
          "div",
          {
            style: {
              overflowX: "auto",
              padding: "8px 16px 16px",
              display: "flex",
              gap: 6,
            },
          },
          days.map((d, i) =>
            h(
              "div",
              {
                key: i,
                className: `day-pill ${selectedDay === i ? "active" : "inactive"}`,
                onClick: () => {
                  setSelectedDay(i);
                  setExpandedItems({});
                },
              },
              h(
                "div",
                { style: { fontSize: 10, opacity: 0.7 } },
                d.date.split(" ")[0] +
                  " " +
                  (d.date.split(" ")[1] || "").replace(/[()]/g, "")
              ),
              h(
                "div",
                { style: { fontSize: 11, fontWeight: 600, marginTop: 2 } },
                d.city.length > 14 ? d.city.split(" ")[0] : d.city
              )
            )
          )
        ),

        h(
          "div",
          { style: { padding: "0 16px 24px" } },
          h(
            "div",
            { style: { marginBottom: 16 } },
            h(
              "div",
              {
                style: {
                  display: "flex",
                  alignItems: "center",
                  gap: 8,
                  marginBottom: 4,
                },
              },
              h(
                "span",
                { style: { fontSize: 20, fontWeight: 700, color: "#fff" } },
                "Day " + day.day
              ),
              day.travel &&
                h(
                  "span",
                  {
                    style: {
                      fontSize: 10,
                      padding: "2px 8px",
                      borderRadius: 10,
                      background: "rgba(100,149,237,.2)",
                      color: "#6495ED",
                      fontWeight: 600,
                    },
                  },
                  "TRAVEL DAY"
                )
            ),
            h(
              "div",
              {
                style: {
                  fontSize: 15,
                  fontWeight: 600,
                  color: "#f5a623",
                  marginBottom: 2,
                },
              },
              day.theme
            ),
            h(
              "div",
              { style: { fontSize: 12, color: "#8892b0" } },
              day.city + " · " + day.schedule.length + " activities"
            )
          ),

          day.schedule.map((item, idx) => {
            const tc = typeColors[item.type] || typeColors.explore;
            const isOpen = expandedItems[idx];

            return h(
              "div",
              {
                key: idx,
                className: "sched-item",
                onClick: () => toggleItem(idx),
                style: {
                  background: tc.bg,
                  border: "1px solid " + tc.border,
                },
              },
              h(
                "div",
                {
                  style: {
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "flex-start",
                  },
                },
                h(
                  "div",
                  { style: { flex: 1 } },
                  h(
                    "div",
                    {
                      style: {
                        fontSize: 10,
                        color: "#8892b0",
                        marginBottom: 3,
                        fontWeight: 600,
                      },
                    },
                    item.time
                  ),
                  h(
                    "div",
                    { style: { fontSize: 14, fontWeight: 600, color: "#fff" } },
                    item.activity
                  )
                ),
                h(
                  "span",
                  {
                    style: {
                      fontSize: 14,
                      opacity: 0.5,
                      transform: isOpen ? "rotate(180deg)" : "rotate(0)",
                      transition: "transform .2s",
                    },
                  },
                  "▾"
                )
              ),
              isOpen &&
                h(
                  "div",
                  {
                    style: {
                      marginTop: 8,
                      fontSize: 12,
                      color: "#b0b8c8",
                      lineHeight: 1.7,
                      borderTop: "1px solid " + tc.border,
                      paddingTop: 8,
                    },
                  },
                  item.detail
                )
            );
          })
        ),

        h(
          "div",
          {
            style: {
              padding: "12px 16px 24px",
              textAlign: "center",
              fontSize: 11,
              color: "#5a6174",
            },
          },
          "Tap any activity to expand details · Prices approximate · April 2026"
        )
      );
    }

    ReactDOM.render(h(App), document.getElementById("root"));
  </script>
</body>
</html>
